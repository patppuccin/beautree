# Release manifest for beautree
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

snapshot:
  version_template: "dev"

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    main: ./src/
    binary: beautree
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.appVersion={{.Version}}
      - -X main.buildCommit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}
    flags:
      - -trimpath

dockers_v2:
  - images:
      - ghcr.io/patppuccin/beautree
      - docker.io/patppuccin/beautree
    tags:
      - "{{ .Tag }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.source": "https://github.com/patppuccin/beautree"
    disable: false

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ if eq .Arch "amd64" }}x86_64{{ else if eq .Arch "386" }}i386{{ else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  footer: >-

    ---

    Find installation and usage instructions [on the readme page](https://github.com/patppuccin/beautree#readme).
    Released using [GoReleaser](https://github.com/goreleaser/goreleaser).
